<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Title</title>
        <link rel="stylesheet" href="styles.css" />
        <script src="script.js"></script>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <style>
            body {
                background-color: #fff2fd !important;
                    }
        </style>
    </head>
        <body>
        
        <div id="header" class="mb-5"></div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
        <section class="py-5">
            <div class="container-fluid p-lg-0">
                <div class="row g-0 align-items-center">
                    <div class="col-lg-6">
                        <div class="col-lg-8 mx-auto">
                            <span class="text-muted">Let's Talk</span>
                            <h2 class="display-5 fw-bold">Contact Us</h2>
                            <p class="lead">
                               Have a question about our services or need a custom quote? We are here to help. Fill out the form below or reach out to us directly, and our team will get back to you as soon as possible.
                            </p>
                            <form>
                                <div class="row">
                                    <div class="col-md-12">
                                        <div class="mb-3">
                                            <input class="form-control bg-light" placeholder="Your name" type="text" />
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <div class="mb-3">
                                            <input class="form-control bg-light" placeholder="Your email" type="text" />
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <div class="mb-3">
                                            <textarea
                                                class="form-control bg-light"
                                                placeholder="Your message"
                                                rows="4"></textarea>
                                        </div>
                                    </div>
                                    <div class="col-md-5">
                                        <div class="d-grid">
                                            <button class="btn btn-dark" type="submit">Send message</button>
                                        </div>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    <div class="col-lg-6">
                        <div class="mt-5 mt-lg-0">
                            <img alt="SheSafe" class="img-fluid" src="https://www.voiped.com/media/yjcj2k2u/telefonia-ip-empresas.jpg" />
                        </div>
                    </div>
                </div>
            </div>
        </section>
        
        <div id="footer"></div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
            
    </body>
</html>
